<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./asset/css/styles.css">
</head>
<body>

    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
        <span class="mode-icon">☀️</span>
    </button>

    <main class="clock-container">
        <div class="time-display-wrapper">
            <span id="current-time">00:00:00 PM</span>
        </div>

        <div class="alarm-setup-wrapper">
            <div class="inputs-row">
                <div class="input-group">
                    <input type="number" id="alarm-hours" min="1" max="12" placeholder="12">
                    <label>HR</label>
                </div>
                <span class="colon">:</span>
                <div class="input-group">
                    <input type="number" id="alarm-minutes" min="0" max="59" placeholder="00">
                    <label>MIN</label>
                </div>
                <div class="input-group">
                    <select id="alarm-period">
                        <option value="AM">AM</option>
                        <option value="PM" selected>PM</option>
                    </select>
                    <label>AM/PM</label>
                </div>
            </div>
            <button id="add-alarm-btn" class="btn btn-primary">Add Alarm</button>
        </div>

        <div class="alarms-list-box">
            <div id="active-alarms-list"></div>
        </div>
    </main>

    <footer class="footer">
        <p>by Abdur Rahman</p>
    </footer>
  
    <script src="./asset/js/main.js"></script>
</body>
</html>
